# 802.15.4 <-> WiFi tunnel bridge
# Ported from /Users/brady/ncfsund/sta/prj.conf and adapted:
#   - dropped CONFIG_NET_CONFIG_SETTINGS / NET_CONFIG_MY_IPV4_* (DHCP-only)
#   - renamed CONFIG_STA_SAMPLE_* -> CONFIG_BRIDGE_*
#   - 802.15.4 + MPSL Kconfig is added in step 3 of the implementation plan,
#     not yet enabled here so the WiFi-only build can be confirmed first.

CONFIG_GPIO=y

# IEEE 802.15.4 driver (raw, no Zephyr L2 -- bridge talks to nrf_802154 directly).
CONFIG_NRF_802154_RADIO_DRIVER=y
CONFIG_NET_L2_IEEE802154=n

CONFIG_NET_PROMISCUOUS_MODE=n

# CONFIG_NET_PKT_RX_COUNT=16
# CONFIG_NET_PKT_TX_COUNT=16
# CONFIG_NRF70_RX_NUM_BUFS=16

# # Below section is the primary contributor to SRAM and is currently
# # tuned for performance; revisit if the bridge's RAM gets tight.
# CONFIG_NET_BUF_RX_COUNT=16
# CONFIG_NET_BUF_TX_COUNT=32
# CONFIG_HEAP_MEM_POOL_SIZE=37000
# CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
# CONFIG_NRF_WIFI_CTRL_HEAP_SIZE=20000
# CONFIG_NRF_WIFI_DATA_HEAP_SIZE=40000
# CONFIG_NET_TC_TX_COUNT=1

# CONFIG_NET_IF_UNICAST_IPV4_ADDR_COUNT=1
# CONFIG_NET_MAX_CONTEXTS=5
# CONFIG_NET_CONTEXT_SYNC_RECV=y

# CONFIG_INIT_STACKS=y

# CONFIG_NET_L2_ETHERNET=y

# CONFIG_NET_SOCKETS_POLL_MAX=10

# Memories
# CONFIG_MAIN_STACK_SIZE=5200
# CONFIG_NET_TX_STACK_SIZE=4096
# CONFIG_NET_RX_STACK_SIZE=4096
# CONFIG_BRIDGE_WIFI_START_STACK_SIZE=5200

# Debugging
CONFIG_STACK_SENTINEL=y
CONFIG_DEBUG_COREDUMP=y
CONFIG_DEBUG_COREDUMP_BACKEND_LOGGING=y
CONFIG_DEBUG_COREDUMP_MEMORY_DUMP_MIN=y
CONFIG_SHELL_CMDS_RESIZE=n

# Kernel options
CONFIG_ENTROPY_GENERATOR=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=2048
CONFIG_POSIX_TIMERS=y

CONFIG_PINCTRL=y
